<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="c">
      <circle cx="32" cy="32" r="21"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0F172A"/>

  <!-- Globe grid lines -->
  <g clip-path="url(#c)" stroke="#1E3A5F" stroke-width="0.75" fill="none">
    <line x1="11" y1="32" x2="53" y2="32"/>
    <ellipse cx="32" cy="22" rx="18" ry="4.5"/>
    <ellipse cx="32" cy="42" rx="18" ry="4.5"/>
    <ellipse cx="32" cy="32" rx="9" ry="21"/>
  </g>

  <!-- Benchmark trend line -->
  <polyline
    points="17,43 22,37 28,40 36,26 46,18"
    clip-path="url(#c)"
    stroke="#34D399" stroke-width="2.2" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow tip -->
  <polyline
    points="41,19 46,18 45,23"
    clip-path="url(#c)"
    stroke="#34D399" stroke-width="2.2" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data point dots -->
  <g clip-path="url(#c)" fill="#34D399">
    <circle cx="22" cy="37" r="1.5"/>
    <circle cx="28" cy="40" r="1.5"/>
    <circle cx="36" cy="26" r="1.5"/>
  </g>

  <!-- Globe outline -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#38BDF8" stroke-width="1.5"/>
</svg>
