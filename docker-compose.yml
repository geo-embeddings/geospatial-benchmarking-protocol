services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=gbp
      - POSTGRES_PASSWORD=gbp
      - POSTGRES_DB=gbp
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./packages:/app/packages
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg://gbp:gbp@postgres:5432/gbp
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://backend:8000
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - node_modules/

volumes:
  db-data:
