version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      prod:
        dependency-type: production
      dev:
        dependency-type: development

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      prod:
        dependency-type: production
      dev:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
