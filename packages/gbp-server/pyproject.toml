[project]
name = "gbp-server"
version = "0.1.0"
description = "Geospatial Benchmarking Protocol server"
readme = "README.md"
authors = [
    { name = "Pete Gadomski", email = "pete.gadomski@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard]>=0.135.2",
    "psycopg[binary]>=3",
    "sqlalchemy>=2",
    "uvicorn[standard]>=0.42.0",
]

[build-system]
requires = ["uv_build>=0.11,uv_build<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "gbp.server"
