[project]
name = "gbp-server"
version = "0.1.0"
description = "Geospatial Benchmarking Protocol server"
readme = "README.md"
authors = [
    { name = "Pete Gadomski", email = "pete.gadomski@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard]>=0.135.2",
    "gbp",
    "uvicorn[standard]>=0.42.0",
]

[tool.uv.sources]
gbp = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.12,<0.11.0"]
build-backend = "uv_build"
