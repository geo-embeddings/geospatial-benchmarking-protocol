[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "httpx>=0.28",
    "pytest>=8",
    "ruff>=0.15.7",
    "testcontainers[postgres]>=4",
    "ty>=0.0.24",
]

[tool.pytest]
norecursedirs = ["cdk.out", "node_modules", ".venv"]

[tool.ruff]
src = ["packages/*/src"]
namespace-packages = ["packages/*/src/gbp"]
