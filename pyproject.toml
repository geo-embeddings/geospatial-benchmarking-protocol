[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.3",
    "ruff>=0.15.10",
    "testcontainers[postgres]>=4.14.2",
    "ty>=0.0.29",
]

[tool.pytest]
norecursedirs = ["cdk.out", "node_modules", ".venv"]

[tool.ruff]
src = ["packages/*/src"]
namespace-packages = ["packages/*/src/gbp"]
